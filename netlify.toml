# Netlify build output (Vite default)
[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://www.michaelsam94.com/*"
  to = "https://michaelsam94.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.michaelsam94.com/*"
  to = "https://michaelsam94.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://michaelsam94.com/*"
  to = "https://michaelsam94.com/:splat"
  status = 301
  force = true

# Hashed assets can be cached forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static root files (images, PDF, favicons)
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
